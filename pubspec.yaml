name: flutter_cicd
description: Local-first mobile CI/CD system with Flutter desktop GUI
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # DI
  get_it: ^7.6.7

  # Config / serialization
  yaml: ^3.1.2

  # Database (run history)
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # Routing
  go_router: ^14.2.0

  # File picker (native macOS open panel)
  file_selector: ^1.0.3

  # Secure credential storage (macOS Keychain)
  flutter_secure_storage: ^9.2.2

  # UI utilities
  intl: ^0.19.0
  gap: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.11
  drift_dev: ^2.18.0
  mocktail: ^1.0.4
  bloc_test: ^9.1.7

flutter:
  uses-material-design: true
